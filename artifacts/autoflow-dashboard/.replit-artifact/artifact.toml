kind = "web"
previewPath = "/"
title = "AutoFlow AI Dashboard"
version = "1.0.0"
id = "artifacts/autoflow-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25858

[services.development]
run = "pnpm --filter @workspace/autoflow-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autoflow-dashboard", "run", "build" ]
publicDir = "artifacts/autoflow-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25858"
BASE_PATH = "/"
